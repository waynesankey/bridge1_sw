<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Input Label Edit — Mockup</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e7eef6;
      --panel: #fdfefe;
      --ink: #2b5f87;
      --accent: #18b8ef;
      --accent-2: #1d79e4;
      --muted: #6886a4;
      --border: #bbd4eb;
      --shadow: 0 14px 30px rgba(44,88,130,0.14);
      --input-btn-bg: #f8fbff;
      --input-btn-text: var(--ink);
      --input-btn-border: #c1d8ee;
      --input-btn-shadow: 0 6px 14px rgba(44,88,130,0.1);
      --input-active-bg: linear-gradient(90deg,#1d79e4 0%,#18b8ef 100%);
      --input-active-border: #1b7fdf;
      --input-active-text: #f5faff;
      --input-active-ring: 0 0 0 2px rgba(29,121,228,0.24);
      --ghost-text: #1d79e4;
      --ghost-border: #1d79e4;
      --edit-focus-border: #1d79e4;
      --edit-focus-ring: 0 0 0 3px rgba(29,121,228,0.18);
      --pencil-color: #9db6cc;
      --pencil-hover: #1d79e4;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0d0d0f;
      --panel: #191a1d;
      --ink: #d6dbe3;
      --muted: #9fa8b6;
      --border: rgba(235,238,245,0.22);
      --shadow: 0 22px 48px rgba(0,0,0,0.45);
      --input-btn-bg: #26282d;
      --input-btn-text: #f0f1f3;
      --input-btn-border: rgba(235,238,245,0.2);
      --input-btn-shadow: 0 6px 14px rgba(0,0,0,0.32);
      --input-active-bg: #3f434b;
      --input-active-border: #8f949f;
      --input-active-text: #f5f7fa;
      --input-active-ring: 0 0 0 2px rgba(166,172,183,0.32);
      --ghost-text: #c6cad2;
      --ghost-border: #8f949f;
      --edit-focus-border: #8f949f;
      --edit-focus-ring: 0 0 0 3px rgba(166,172,183,0.22);
      --pencil-color: #606670;
      --pencil-hover: #c6cad2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk","IBM Plex Sans","Avenir Next",sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    h2 {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .row-inline {
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 14px;
      padding: 18px 0;
    }

    .label {
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--ink);
    }

    /* ── Input group ── */
    .input-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    /* ── Wrapper that holds the button OR the edit field ── */
    .inp-slot {
      position: relative;
      display: flex;
    }

    /* ── Normal button ── */
    .input-btn {
      flex: 1;
      padding: 10px 32px 10px 12px; /* extra right padding for pencil */
      border-radius: 14px;
      border: 1px solid var(--input-btn-border);
      background: var(--input-btn-bg);
      color: var(--input-btn-text);
      font-weight: 600;
      font-size: 1.05rem;
      box-shadow: var(--input-btn-shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 120ms ease, box-shadow 120ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .input-btn.active {
      background: var(--input-active-bg);
      border-color: var(--input-active-border);
      color: var(--input-active-text);
      box-shadow: var(--input-active-ring);
    }

    .input-btn:active { transform: translateY(1px); }

    /* ── Pencil icon ── */
    .pencil-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--pencil-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 150ms ease, color 150ms ease, background 150ms ease;
    }

    /* show pencil on slot hover */
    .inp-slot:hover .pencil-btn,
    .inp-slot:focus-within .pencil-btn {
      opacity: 1;
    }

    .pencil-btn:hover {
      color: var(--pencil-hover);
      background: rgba(29,121,228,0.1);
    }

    .pencil-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* ── Edit field (replaces button when editing) ── */
    .inp-slot.editing .input-btn   { display: none; }
    .inp-slot.editing .pencil-btn  { display: none; }

    .edit-field {
      display: none;
      flex: 1;
    }

    .inp-slot.editing .edit-field  { display: flex; gap: 6px; }

    .edit-field input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1.5px solid var(--edit-focus-border);
      background: var(--input-btn-bg);
      color: var(--ink);
      font-family: inherit;
      font-weight: 600;
      font-size: 1.05rem;
      outline: none;
      box-shadow: var(--edit-focus-ring);
    }

    .edit-field button {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--edit-focus-border);
      background: var(--input-active-bg);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px; height: 42px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      margin-bottom: 20px;
    }

    .note {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="app">

  <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <h2>Option A — inline pencil icon</h2>

  <!-- ─── NORMAL STATE ─── -->
  <div class="panel">
    <div class="row-inline">
      <span class="label">Input</span>
      <div class="input-group" id="inputGroup"></div>
    </div>
    <p class="note">Hover over a button to reveal the pencil. Click it to edit inline.</p>
  </div>

</div>

<script>
  const labels = { 1:"CD Player", 2:"Turntable", 3:"Streamer/DAC", 4:"Auxiliary" };
  let activeInput = 2; // simulate input 2 selected

  const group = document.getElementById('inputGroup');

  function buildGroup() {
    group.innerHTML = '';
    for (let i = 1; i <= 4; i++) {
      const slot = document.createElement('div');
      slot.className = 'inp-slot';
      slot.dataset.inp = i;

      // ── Main button ──
      const btn = document.createElement('button');
      btn.className = 'input-btn' + (i === activeInput ? ' active' : '');
      btn.textContent = labels[i];
      btn.title = `Select ${labels[i]}`;
      btn.addEventListener('click', () => {
        activeInput = i;
        buildGroup();
      });

      // ── Pencil icon ──
      const pencil = document.createElement('button');
      pencil.className = 'pencil-btn';
      pencil.title = 'Rename this input';
      pencil.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/>
      </svg>`;
      pencil.addEventListener('click', (e) => {
        e.stopPropagation();
        slot.classList.add('editing');
        editInput.value = labels[i];
        editInput.focus();
        editInput.select();
      });

      // ── Edit field ──
      const editField = document.createElement('div');
      editField.className = 'edit-field';

      const editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.maxLength = 16;
      editInput.value = labels[i];

      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.addEventListener('click', () => {
        const newName = editInput.value.trim() || labels[i];
        labels[i] = newName;
        slot.classList.remove('editing');
        buildGroup();
        // In real app: send SET LABELS command here
      });

      editInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveBtn.click();
        if (e.key === 'Escape') {
          slot.classList.remove('editing');
          buildGroup();
        }
      });

      editField.appendChild(editInput);
      editField.appendChild(saveBtn);

      slot.appendChild(btn);
      slot.appendChild(pencil);
      slot.appendChild(editField);
      group.appendChild(slot);
    }
  }

  buildGroup();

  // Theme toggle
  document.getElementById('themeBtn').addEventListener('click', () => {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? '' : 'dark';
  });
</script>
</body>
</html>
