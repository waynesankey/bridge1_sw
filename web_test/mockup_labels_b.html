<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Input Label Edit B — Mockup</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e7eef6;
      --panel: #fdfefe;
      --ink: #2b5f87;
      --accent: #18b8ef;
      --accent-2: #1d79e4;
      --muted: #6886a4;
      --border: #bbd4eb;
      --shadow: 0 14px 30px rgba(44,88,130,0.14);
      --input-btn-bg: #f8fbff;
      --input-btn-text: var(--ink);
      --input-btn-border: #c1d8ee;
      --input-btn-shadow: 0 6px 14px rgba(44,88,130,0.1);
      --input-active-bg: linear-gradient(90deg,#1d79e4 0%,#18b8ef 100%);
      --input-active-border: #1b7fdf;
      --input-active-text: #f5faff;
      --input-active-ring: 0 0 0 2px rgba(29,121,228,0.24);
      --ghost-text: #1d79e4;
      --ghost-border: #1d79e4;
      --toggle-bg: #f3f9ff;
      --toggle-border: #b9d4ec;
      --toggle-text: #486a88;
      --toggle-shadow: 0 4px 10px rgba(44,88,130,0.1);
      --modal-overlay: rgba(30,60,100,0.28);
      --modal-bg: #fdfefe;
      --modal-shadow: 0 28px 60px rgba(44,88,130,0.22);
      --field-border: #bbd4eb;
      --field-focus-border: #1d79e4;
      --field-focus-ring: 0 0 0 3px rgba(29,121,228,0.15);
      --field-bg: #f4f9ff;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0d0d0f;
      --panel: #191a1d;
      --ink: #d6dbe3;
      --muted: #9fa8b6;
      --border: rgba(235,238,245,0.22);
      --shadow: 0 22px 48px rgba(0,0,0,0.45);
      --input-btn-bg: #26282d;
      --input-btn-text: #f0f1f3;
      --input-btn-border: rgba(235,238,245,0.2);
      --input-btn-shadow: 0 6px 14px rgba(0,0,0,0.32);
      --input-active-bg: #3f434b;
      --input-active-border: #8f949f;
      --input-active-text: #f5f7fa;
      --input-active-ring: 0 0 0 2px rgba(166,172,183,0.32);
      --ghost-text: #c6cad2;
      --ghost-border: #8f949f;
      --toggle-bg: #24262b;
      --toggle-border: rgba(235,238,245,0.24);
      --toggle-text: #e1e4ea;
      --toggle-shadow: 0 4px 10px rgba(0,0,0,0.35);
      --modal-overlay: rgba(0,0,0,0.55);
      --modal-bg: #1e2024;
      --modal-shadow: 0 28px 60px rgba(0,0,0,0.55);
      --field-border: rgba(235,238,245,0.2);
      --field-focus-border: #8f949f;
      --field-focus-ring: 0 0 0 3px rgba(166,172,183,0.18);
      --field-bg: #26282d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk","IBM Plex Sans","Avenir Next",sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .app {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    h2 {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .row-inline {
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 14px;
      padding: 18px 0;
    }

    .label {
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--ink);
    }

    .input-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .input-btn {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--input-btn-border);
      background: var(--input-btn-bg);
      color: var(--input-btn-text);
      font-weight: 600;
      font-size: 1.05rem;
      box-shadow: var(--input-btn-shadow);
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .input-btn.active {
      background: var(--input-active-bg);
      border-color: var(--input-active-border);
      color: var(--input-active-text);
      box-shadow: var(--input-active-ring);
    }

    .input-btn:active { transform: translateY(1px); }

    .actions-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button.ghost {
      padding: 10px 18px;
      border-radius: 14px;
      background: transparent;
      color: var(--ghost-text);
      border: 1px solid var(--ghost-border);
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    button.ghost:active { transform: translateY(1px); }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px; height: 42px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      margin-bottom: 20px;
    }

    .note {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 12px;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    /* ── Modal box ── */
    .modal {
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--modal-shadow);
      padding: 28px 28px 22px;
      width: 100%;
      max-width: 420px;
      animation: modalIn 200ms ease both;
    }

    @keyframes modalIn {
      from { opacity:0; transform: translateY(12px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);    }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-title {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--ink);
      margin: 0;
    }

    .modal-close {
      width: 32px; height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    .modal-close:hover { color: var(--ink); background: rgba(100,130,160,0.1); }

    /* ── Fields ── */
    .field-row {
      display: grid;
      grid-template-columns: 60px 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .field-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .field-row input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--field-border);
      background: var(--field-bg);
      color: var(--ink);
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .field-row input[type="text"]:focus {
      border-color: var(--field-focus-border);
      box-shadow: var(--field-focus-ring);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-cancel {
      padding: 10px 20px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-save {
      padding: 10px 24px;
      border-radius: 14px;
      border: none;
      background: var(--input-active-bg);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(29,121,228,0.28);
      transition: transform 120ms ease;
    }

    .btn-save:active { transform: translateY(1px); }
  </style>
</head>
<body>
<div class="app">

  <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <h2>Option B — settings modal</h2>

  <div class="panel">
    <div class="row-inline">
      <span class="label">Input</span>
      <div class="input-group" id="inputGroup"></div>
    </div>

    <div class="row-inline">
      <span class="label">Actions</span>
      <div class="actions-group">
        <button class="ghost" id="editLabelsBtn">Edit Input Names</button>
      </div>
    </div>

    <p class="note">Click "Edit Input Names" to open the modal. Input buttons are completely unchanged.</p>
  </div>

</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Input Names</h3>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    </div>

    <div id="fieldRows"></div>

    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save"   id="modalSave">Save</button>
    </div>
  </div>
</div>

<script>
  const labels = { 1:"CD Player", 2:"Turntable", 3:"Streamer/DAC", 4:"Auxiliary" };
  let activeInput = 2;

  // ── Build input buttons ──
  function buildGroup() {
    const group = document.getElementById('inputGroup');
    group.innerHTML = '';
    for (let i = 1; i <= 4; i++) {
      const btn = document.createElement('button');
      btn.className = 'input-btn' + (i === activeInput ? ' active' : '');
      btn.textContent = labels[i];
      btn.addEventListener('click', () => { activeInput = i; buildGroup(); });
      group.appendChild(btn);
    }
  }

  buildGroup();

  // ── Modal open/close ──
  function openModal() {
    const rows = document.getElementById('fieldRows');
    rows.innerHTML = '';
    for (let i = 1; i <= 4; i++) {
      const row = document.createElement('div');
      row.className = 'field-row';
      row.innerHTML = `
        <label class="field-label" for="inp${i}">Input ${i}</label>
        <input id="inp${i}" type="text" maxlength="16" value="${labels[i]}" />
      `;
      rows.appendChild(row);
    }
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inp1').focus();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('editLabelsBtn').addEventListener('click', openModal);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalCancel').addEventListener('click', closeModal);

  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('modalSave').addEventListener('click', () => {
    for (let i = 1; i <= 4; i++) {
      const val = document.getElementById(`inp${i}`).value.trim();
      if (val) labels[i] = val;
    }
    buildGroup();
    closeModal();
    // In real app: send SET LABELS command here
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Theme toggle ──
  document.getElementById('themeBtn').addEventListener('click', () => {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? '' : 'dark';
  });
</script>
</body>
</html>
