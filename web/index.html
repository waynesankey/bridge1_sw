<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Monster</title>
    <link rel="stylesheet" href="/style.css?v=20260315a" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="brand">
          <span class="brand-icon brand-icon-light" aria-hidden="true">
            <img class="brand-icon-img" src="/speaker_light_256.png" alt="" />
          </span>
          <span class="brand-icon brand-icon-dark" aria-hidden="true">
            <img class="brand-icon-img" src="/speaker_dark_256.png" alt="" />
          </span>
          <h1>The Monster</h1>
        </div>
        <div class="top-controls">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Theme: Light">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section class="panel">
        <div class="row">
          <label class="label" for="volume">Volume</label>
          <input id="volume" type="range" min="0" max="64" step="1" />
          <div class="value" id="volumeValue">0</div>
        </div>

        <div class="row row-inline">
          <label class="label">Input</label>
          <div class="input-group" id="inputGroup"></div>
        </div>

        <div class="row row-inline">
          <label class="label" for="mute">Mute</label>
          <button id="mute" class="toggle">Off</button>
        </div>

        <div class="row">
          <label class="label" for="balance">Balance</label>
          <input id="balance" type="range" min="-6" max="6" step="1" />
          <div class="value" id="balanceValue">0</div>
        </div>

        <div class="row row-inline">
          <label class="label">Brightness</label>
          <div class="input-group" id="brightnessGroup"></div>
        </div>

        <div class="row row-inline">
          <label class="label">Actions</label>
          <div class="actions-group">
            <button id="volumeDisplay" class="ghost" type="button">Volume Display: INT</button>
            <button id="refresh" class="ghost" type="button">Refresh</button>
            <button id="editLabels" class="ghost" type="button">Edit Input Names</button>
          </div>
        </div>

        <div class="panel-footer">
          <span class="version" id="version"></span>
          <div class="status-wrap">
            <span class="status-dot" id="statusDot"></span>
            <div class="status" id="status">Disconnected</div>
          </div>
        </div>
      </section>

    </div>

    <div class="modal-overlay" id="labelsModal" role="dialog" aria-modal="true" aria-labelledby="labelsModalTitle">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="labelsModalTitle">Input Names</h3>
          <button class="modal-close" id="labelsModalClose" type="button" aria-label="Close">&#x2715;</button>
        </div>
        <div id="labelsFields"></div>
        <div class="modal-footer">
          <button class="modal-btn-cancel" id="labelsModalCancel" type="button">Cancel</button>
          <button class="modal-btn-save"   id="labelsModalSave"   type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="/app.js?v=20260315a"></script>
  </body>
</html>
